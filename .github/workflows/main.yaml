name: main
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # `go test` uses only a high-confidence subset of go vet, so execute also `go vet`
      - run: make vet

      - run: go fmt ./... && git diff --exit-code

      - run: make test

  release:
    runs-on: ubuntu-latest
    needs: test
    if: contains(github.ref, 'tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: abicky
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Create a draft release so GoReleaser can upload artifacts when GitHub release immutability is enabled
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME"

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use a custom token instead of GITHUB_TOKEN for the homebrew tap
          # cf. https://www.goreleaser.com/resources/errors/resource-not-accessible-by-integration/
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
