version: 2

updates:
  - package-ecosystem: gomod
    directories:
      - /
    schedule:
      interval: daily
      time: "20:00"
      timezone: Asia/Tokyo
    cooldown:
      default-days: 7
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: "20:00"
      timezone: Asia/Tokyo
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
